<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>Console</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      background: #000000;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .console-header {
      flex-shrink: 0;
      height: 36px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #000000;
      border-bottom: 1px solid #333333;
      font-size: 12px;
      font-weight: 600;
      color: #b0b0b0;
    }
    .console-header .title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .console-header .title svg { width: 16px; height: 16px; opacity: 0.9; }
    .console-header button {
      width: 32px;
      height: 28px;
      border: none;
      background: transparent;
      color: #b0b0b0;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .console-header button:hover { background: #1a1a1a; color: #ffffff; }
    .console-header button.close:hover { background: #c00; color: #fff; }
    .console-output {
      flex: 1;
      min-height: 0;
      padding: 10px 14px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      color: #b0b0b0;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="console-header">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      Console
    </div>
    <button type="button" class="close" id="btn-close" title="Close">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="console-output" id="output"></div>

  <script>
    (function() {
      const output = document.getElementById('output');
      window.__appendLog = function(text) {
        if (typeof text !== 'string') text = String(text);
        output.appendChild(document.createTextNode(text));
        output.scrollTop = output.scrollHeight;
      };
      window.__setLogContent = function(lines) {
        if (!Array.isArray(lines)) return;
        output.innerHTML = '';
        lines.forEach(function(line) {
          output.appendChild(document.createTextNode(line));
        });
        output.scrollTop = output.scrollHeight;
      };
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ action: 'consoleReady' }));
      }
      document.getElementById('btn-close').addEventListener('click', function() {
        if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage(JSON.stringify({ action: 'consoleClose' }));
        }
      });
      /* Drag console from header (WebView2 consumes hit-test) */
      var consoleHeader = document.querySelector('.console-header');
      if (consoleHeader) {
        consoleHeader.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          if (e.target.closest('button')) return;
          if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(JSON.stringify({ action: 'consoleBeginMove' }));
          }
        });
      }
    })();
  </script>
</body>
</html>
